<!DOCTYPE html>
<html>
<head>
  <title>Register</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #ffffff;
    }

    /* ===== REGISTER CARD ===== */
    .container {
      width: 360px;
      padding: 40px 30px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      border: 1px solid #eee;

      animation: fadeIn 0.6s ease;
      transition: 0.3s ease;
    }

    /* hover effect */
    .container:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 40px rgba(0,0,0,0.15);
    }

    /* TITLE */
    h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #333;
      animation: slideDown 0.5s ease;
    }

    /* INPUTS */
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
      outline: none;
      transition: 0.3s;
    }

    input:focus {
      border-color: #4facfe;
      box-shadow: 0 0 8px rgba(79,172,254,0.3);
      transform: scale(1.02);
    }

    /* BUTTON */
    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 8px;
      background: #4facfe;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #2f89fc;
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(47,137,252,0.3);
    }

    /* TEXT */
    p {
      text-align: center;
      margin-top: 15px;
      color: #555;
      font-size: 14px;
    }

    a {
      color: #2f89fc;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    a:hover {
      color: #1c6fe0;
      text-decoration: underline;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>

</head>

<body>

<div class="container">

  <h2>Register</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <button onclick="register()">Register</button>

  <p>Already have account? <a href="login.html">Login</a></p>

</div>

<script src="js/register.js"></script>

</body>
</html>
